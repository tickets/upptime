status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.ttm.org
  # baseUrl: /upptime
  name: TICKETS
  introTitle: "**TICKETS Status** — real-time uptime and incident history for our services."
  introMessage: This is the open-source status page for **TICKETS**, powered by [Upptime](https://github.com/upptime/upptime). It uses **real-time** data committed to our [GitHub repository](https://github.com/tickets/upptime). No server required — just GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# People assigned to the auto-created downtime issues. GitHub emails these
# users (per their notification settings) whenever an endpoint goes down.
assignees:
  - belovolk

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
